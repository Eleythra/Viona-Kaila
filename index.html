<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e14" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://127.0.0.1:3001 http://localhost:3001 https:; frame-src 'self' https://www.google.com https://maps.google.com; media-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" />
    <title>Viona — Kaila Beach Hotel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css?v=85" />
    <link rel="stylesheet" href="css/promo-popup.css?v=2" />
  </head>
  <body>
    <div id="app">
      <!-- Dil seçimi -->
      <section id="view-lang" class="view view--lang" aria-labelledby="lang-screen-heading">
        <div class="lang-bg" aria-hidden="true"></div>
        <div class="lang-overlay"></div>
        <div class="lang-content">
          <div class="lang-content-accent" aria-hidden="true"></div>
          <header class="lang-header">
            <p class="lang-brand">Viona</p>
            <h1 id="lang-screen-heading" class="lang-title" data-i18n="langScreenTitle">Choose your language</h1>
            <p class="lang-sub" data-i18n="langScreenSubtitle">Kaila Beach Hotel · Smart hotel assistant</p>
          </header>
          <div class="lang-grid-wrap">
            <div class="lang-grid" role="group" data-i18n-aria="langGridAria">
              <button type="button" class="lang-chip" data-lang="tr" aria-pressed="false">Türkçe</button>
              <button type="button" class="lang-chip" data-lang="en" aria-pressed="false">English</button>
              <button type="button" class="lang-chip" data-lang="de" aria-pressed="false">Deutsch</button>
              <button type="button" class="lang-chip" data-lang="pl" aria-pressed="false">Polski</button>
              <button type="button" class="lang-chip" data-lang="ru" aria-pressed="false">Русский</button>
              <button type="button" class="lang-chip" data-lang="da" aria-pressed="false">Dansk</button>
              <button type="button" class="lang-chip" data-lang="cs" aria-pressed="false">Čeština</button>
              <button type="button" class="lang-chip" data-lang="ro" aria-pressed="false">Română</button>
              <button type="button" class="lang-chip" data-lang="nl" aria-pressed="false">Nederlands</button>
              <button type="button" class="lang-chip" data-lang="sk" aria-pressed="false">Slovenčina</button>
            </div>
          </div>
          <button type="button" class="btn-primary lang-cta" id="btn-lang-continue" data-i18n="continue" disabled>
            Continue
          </button>
        </div>
      </section>

      <!-- Erişim: şifre + gizlilik + 18+ (dil seçiminden sonra) -->
      <section id="view-gate" class="view view--gate hidden" aria-hidden="true" aria-labelledby="gate-screen-heading">
        <div class="lang-bg gate-bg" aria-hidden="true"></div>
        <div class="lang-overlay"></div>
        <div class="gate-content">
          <div class="lang-content-accent" aria-hidden="true"></div>
          <header class="lang-header gate-header">
            <p class="lang-brand">Viona</p>
            <h1 id="gate-screen-heading" class="lang-title" data-i18n="gateScreenTitle">Welcome</h1>
            <p class="lang-sub gate-sub" data-i18n="gateScreenSubtitle"></p>
          </header>

          <div class="gate-field">
            <label class="gate-label" for="gate-password" data-i18n="gatePasswordLabel"></label>
            <input
              type="password"
              id="gate-password"
              class="gate-input"
              autocomplete="current-password"
              maxlength="128"
              data-i18n-placeholder="gatePasswordPlaceholder"
            />
          </div>

          <div class="gate-privacy glass-block gate-privacy-card" role="region" aria-labelledby="gate-privacy-heading">
            <h2 id="gate-privacy-heading" class="gate-privacy-title" data-i18n="gatePrivacyTitle"></h2>
            <div class="gate-privacy-scroll">
              <p class="gate-privacy-body" data-i18n="gatePrivacyBody"></p>
              <p class="gate-privacy-body gate-privacy-age-line" data-i18n="gatePrivacyAgeLine"></p>
            </div>
          </div>

          <div class="gate-checks">
            <label class="gate-check">
              <input type="checkbox" id="gate-check-privacy" class="gate-check-input" />
              <span class="gate-check-text" data-i18n="gateCheckPrivacy"></span>
            </label>
          </div>

          <p id="gate-error" class="gate-error hidden" role="alert" aria-live="polite"></p>

          <button type="button" class="btn-primary lang-cta gate-cta" id="btn-gate-continue" data-i18n="gateSubmit">
            Continue
          </button>
          <button type="button" class="gate-back" id="btn-gate-back-lang" data-i18n="gateBackLang"></button>
        </div>
      </section>

      <!-- Ana sayfa -->
      <main
        id="view-home"
        class="view view--home hidden"
        aria-hidden="true"
        aria-labelledby="home-hero-heading"
      >
        <header class="home-head">
          <div
            class="carousel"
            id="carousel"
            aria-roledescription="carousel"
            data-i18n-aria="homeCarouselAria"
          >
            <div class="carousel-track" id="carousel-track"></div>
            <div class="carousel-shine" aria-hidden="true"></div>
          </div>
          <div class="home-hero glass-block">
            <h1 class="home-hero__title" id="home-hero-heading" data-i18n="homeTitle">Kaila Beach Hotel</h1>
            <p class="home-hero__slogan" data-i18n="introLead"></p>
          </div>
        </header>

        <div class="home-body">
          <article
            class="glass-block glass-block--accent home-app-card home-app-card--premium home-reveal"
            role="region"
            data-i18n-aria="homeAppCardAria"
          >
            <p class="home-app-kicker" data-i18n="appVionaTitle"></p>
            <p class="home-app-text" data-i18n="appIntro"></p>
          </article>

          <div class="dual-actions home-reveal" role="group" data-i18n-aria="homeQuickActionsAria">
            <button type="button" class="action-tile action-tile--gold" id="btn-open-rate">
              <svg class="action-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                <path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7L12 17.8 5.7 21l2.3-7-6-4.6h7.6L12 2z" />
              </svg>
              <span class="action-tile__text">
                <span class="action-tile__title" data-i18n="btnRate">Bizi değerlendirin</span>
                <span class="action-tile__hint" data-i18n="btnRateHint"></span>
              </span>
            </button>
            <button type="button" class="action-tile action-tile--cyan" id="btn-open-viona">
              <svg class="action-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                <rect x="5" y="8" width="14" height="10" rx="3" />
                <path d="M9 8V6a3 3 0 016 0v2" />
                <circle cx="10" cy="13" r="1" fill="currentColor" />
                <circle cx="14" cy="13" r="1" fill="currentColor" />
                <path d="M9 18v2M15 18v2" />
              </svg>
              <span class="action-tile__text">
                <span class="action-tile__title" data-i18n="btnViona">Viona otel asistanı</span>
                <span class="action-tile__hint" data-i18n="btnVionaHint"></span>
              </span>
            </button>
          </div>

          <div class="module-grid home-module-grid" id="module-grid"></div>

          <footer class="site-footer" data-i18n="footer"></footer>
        </div>
      </main>

      <!-- Modül / alt sayfa -->
      <section id="view-module" class="view view--module hidden" aria-hidden="true">
        <button type="button" class="btn-back" id="btn-back" data-i18n="back">Geri</button>
        <div class="module-inner glass-block" id="module-inner"></div>
      </section>

      <!-- Değerlendirme modal -->
      <div class="modal-root hidden" id="modal-rate" role="dialog" aria-modal="true" aria-labelledby="modal-rate-title">
        <div class="modal-backdrop" data-close-modal></div>
        <div class="modal-sheet modal-sheet--rate glass-block">
          <div class="modal-head">
            <div class="modal-head-text">
              <h2 id="modal-rate-title" data-i18n="rateModalTitle"></h2>
              <p class="modal-lead" data-i18n="rateModalLead"></p>
              <p class="modal-lead modal-lead--rate-note" data-i18n="rateModalSurveyHint"></p>
            </div>
            <button type="button" class="btn-icon-close" data-close-modal data-i18n-aria="close">
              <span aria-hidden="true">×</span>
            </button>
          </div>
          <div class="rate-modal-body" id="rate-links"></div>
        </div>
      </div>

      <!-- Viona modal — dijital otel asistanı (API: js/viona-chat-config.js) -->
      <div class="modal-root hidden" id="modal-viona" role="dialog" aria-modal="true" aria-labelledby="modal-viona-title">
        <div class="modal-backdrop" data-close-modal></div>
        <div class="modal-sheet modal-sheet--viona glass-block" id="modal-viona-sheet">
          <div class="modal-head modal-head--viona">
            <div class="modal-head-text">
              <h2 id="modal-viona-title" data-i18n="btnViona"></h2>
            </div>
            <button type="button" class="btn-icon-close" data-close-modal data-i18n-aria="close">
              <span aria-hidden="true">×</span>
            </button>
          </div>

          <div class="viona-chat" id="viona-chat" aria-describedby="modal-viona-title">
              <section class="viona-chat-primary" aria-label="" data-i18n-aria="chatAriaPrimary">
                <div class="viona-chat__topbar">
                  <button
                    type="button"
                    class="viona-chat__nav-back"
                    id="viona-chat-nav-back"
                    aria-label=""
                  >
                    <svg class="viona-chat__nav-back-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                      <path d="M15 18l-6-6 6-6" />
                    </svg>
                  </button>
                  <div class="viona-chat__bar" role="toolbar" data-i18n-aria="chatAriaToolbar">
                    <button type="button" class="viona-chat__bar-btn viona-chat__bar-btn--clear" id="viona-chat-clear" data-i18n="chatClear"></button>
                    <button
                      type="button"
                      class="viona-chat__bar-btn viona-chat__bar-btn--voice"
                      id="viona-voice-open"
                      aria-expanded="false"
                      aria-controls="viona-voice-panel"
                    >
                      <svg class="viona-chat__bar-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                        <path d="M12 14a3 3 0 003-3V6a3 3 0 10-6 0v5a3 3 0 003 3z" />
                        <path d="M19 11a7 7 0 01-14 0M12 18v3M8 22h8" stroke-linecap="round" />
                      </svg>
                      <span data-i18n="voiceSectionTitle">Sesli asistan</span>
                    </button>
                  </div>
                </div>
                <div class="viona-chat__voice-hints" id="viona-voice-hints">
                  <p class="viona-chat__voice-open-hint" data-i18n="voiceSectionTapToOpen"></p>
                  <p class="viona-chat__voice-avatar-hint" data-i18n="voiceSectionTapAvatar"></p>
                </div>

                <div
                  class="viona-chat__scroll"
                  id="viona-chat-scroll"
                  role="log"
                  aria-live="polite"
                  aria-relevant="additions"
                  data-i18n-aria="chatAriaLog"
                >
                  <div class="viona-chat__welcome" id="viona-chat-welcome">
                    <div class="viona-chat__welcome-ico" aria-hidden="true">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                        <rect x="5" y="8" width="14" height="10" rx="3" />
                        <path d="M9 8V6a3 3 0 016 0v2" />
                        <circle cx="10" cy="13" r="1" fill="currentColor" />
                        <circle cx="14" cy="13" r="1" fill="currentColor" />
                      </svg>
                    </div>
                    <p class="viona-chat__welcome-title"><span class="viona-chat__welcome-brand">Viona</span><span data-i18n="chatWelcomeTitleLine"></span></p>
                    <p class="viona-chat__welcome-lead" data-i18n="chatWelcomeLead"></p>
                    <p class="viona-chat__welcome-hint" data-i18n="chatEmptyHint"></p>
                  </div>
                  <div class="viona-chat__messages" id="viona-chat-messages"></div>
                  <div class="viona-chat__typing hidden" id="viona-chat-typing" aria-hidden="true"></div>
                </div>

                <div class="viona-chat__quick" id="viona-chat-quick" role="group" data-i18n-aria="chatAriaQuick"></div>

                <div
                  class="viona-voice-drawer"
                  id="viona-voice-panel"
                  role="region"
                  aria-label=""
                  data-i18n-aria="voicePanelAria"
                  data-voice-state="idle"
                  hidden
                >
                  <div class="viona-voice viona-voice--stack" id="viona-voice">
                    <button
                      type="button"
                      class="viona-voice__hit"
                      id="viona-voice-hit"
                      data-i18n-aria="voiceAvatarAria"
                      aria-label=""
                    >
                      <div class="viona-voice__stage">
                        <img
                          id="viona-voice-idle"
                          class="viona-voice__asset viona-voice__asset--idle"
                          src="assets/viona-voice/viona-idle.png"
                          alt=""
                          width="200"
                          height="200"
                          decoding="async"
                        />
                        <video
                          id="viona-voice-listening"
                          class="viona-voice__asset viona-voice__video hidden"
                          src="assets/viona-voice/viona-listening.mp4"
                          loop
                          muted
                          playsinline
                          preload="metadata"
                          aria-hidden="true"
                        ></video>
                        <video
                          id="viona-voice-thinking"
                          class="viona-voice__asset viona-voice__video hidden"
                          src="assets/viona-voice/viona-thinking.mp4"
                          loop
                          muted
                          playsinline
                          preload="metadata"
                          aria-hidden="true"
                        ></video>
                        <video
                          id="viona-voice-speaking"
                          class="viona-voice__asset viona-voice__video hidden"
                          src="assets/viona-voice/viona-speaking.mp4"
                          loop
                          muted
                          playsinline
                          preload="metadata"
                          aria-hidden="true"
                        ></video>
                      </div>
                    </button>
                    <p class="viona-voice__status" id="viona-voice-status" data-i18n="voiceStatusIdle" aria-live="polite"></p>
                  </div>
                </div>

                <div class="viona-chat__composer">
                  <label class="viona-chat__label visually-hidden" for="viona-chat-input" data-i18n="chatComposerLabel"></label>
                  <textarea
                    id="viona-chat-input"
                    class="viona-chat__input"
                    rows="1"
                    maxlength="2000"
                    autocomplete="off"
                    spellcheck="false"
                    data-i18n-placeholder="chatPlaceholder"
                    data-i18n-aria="chatAriaInput"
                  ></textarea>
                  <button type="button" class="viona-chat__send btn-primary" id="viona-chat-send" data-i18n="chatSend"></button>
                </div>
              </section>
          </div>
        </div>
      </div>
    </div>

    <script src="js/viona-gate-config.js?v=2"></script>
    <script src="js/lang-registry.js?v=3"></script>
    <script src="js/i18n.js?v=67"></script>
    <script src="js/i18n-extra-locales.js?v=7"></script>
    <script src="js/i18n-extra-module-overlays.js?v=4"></script>
    <script src="js/i18n-survey-overlays-extra.js?v=2"></script>
    <script src="js/viona-backend-url.js?v=11"></script>
    <script src="js/viona-api-resolve.js?v=12"></script>
    <script src="js/api-config.js?v=13"></script>
    <script src="js/content-shared.js?v=3"></script>
    <script src="js/spa-wellness-catalog.js?v=3"></script>
    <script src="js/requests/config.js?v=21"></script>
    <script src="js/lib/operational-quiet-hours.js?v=1"></script>
    <script src="js/requests/mock-api.js?v=14"></script>
    <script src="js/hotel-room-numbers.js?v=2"></script>
    <script src="js/calendar-picker.js?v=1"></script>
    <script src="js/content-general-locales-extra.js?v=1"></script>
    <script src="js/content-general.js?v=4"></script>
    <script src="js/content-rest.js?v=5"></script>
    <script src="js/content-beach.js?v=3"></script>
    <script src="js/content-alacarte.js?v=7"></script>
    <script src="js/content-spa.js?v=10"></script>
    <script src="js/content-discount.js?v=2"></script>
    <script src="js/content-activities.js?v=11"></script>
    <script src="js/content-sustainability.js?v=5"></script>
    <script src="js/nearby-explore.data.js?v=11"></script>
    <script src="js/content-nearby-explore.js?v=14"></script>
    <script src="js/content-miniclub.js?v=2"></script>
    <script src="js/content-meeting-locales-extra.js?v=1"></script>
    <script src="js/content-meeting.js?v=2"></script>
    <script src="js/content-alanya.js?v=3"></script>
    <script src="js/content-transfer.js?v=3"></script>
    <script src="js/content-room-service.js?v=3"></script>
    <script src="js/render-requests-module.js?v=29"></script>
    <script src="js/content-where-locales-extra.js?v=1"></script>
    <script src="js/content-where.js?v=18"></script>
    <script src="js/viona-chat-config.js?v=12"></script>
    <script src="js/viona-chat.js?v=19"></script>
    <script src="js/viona-voice.js?v=22"></script>
    <script src="js/survey-schema.js?v=4"></script>
    <script src="js/survey-state.js?v=4"></script>
    <script src="js/survey-submit.js?v=11"></script>
    <script src="js/survey-render.js?v=5"></script>
    <script src="js/promo-popup.js?v=27"></script>
    <script src="js/app.js?v=35"></script>
  </body>
</html>
