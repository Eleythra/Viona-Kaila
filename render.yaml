# Render Blueprint — bu repodan SADECE Node (Express) API.
# Python asistan ayrı repoda / ayrı servis (örn. https://viona-kaila.onrender.com) ise
# burada ikinci bir web servisi tanımlamayın; çift deploy olmasın.
#
# Panel: New → Blueprint → bu repo. Oluşan URL, servis adıyla biter:
#   name: viona-node-api  →  https://viona-node-api.onrender.com
# Frontend (viona-backend-url.js + vercel.json) bu host ile uyumludur.
#
# Zorunlu env (Render Dashboard → Environment):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#   ASSISTANT_CHAT_ENDPOINT = Python asistanın tam chat URL’si (aşağıdaki varsayılan)
#
services:
  - type: web
    name: viona-node-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: ASSISTANT_CHAT_ENDPOINT
        value: https://viona-kaila.onrender.com/api/chat
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VECTOR_STORE_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
