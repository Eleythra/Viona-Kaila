# Render Blueprint — iki ayrı web servisi:
#
# 1) Python (uvicorn): sadece asistan — POST /api/chat ve ilgili uçlar.
#    Yanıt başlığında x-render-origin-server: uvicorn görürsünüz.
#
# 2) Node (Express): admin panosu, anketler, misafir istekleri, /api/chat proxy.
#    /api/admin/reports/dashboard burada tanımlıdır; Python servisinde YOKTUR → oraya
#    istek atarsanız 404 alırsınız.
#
# Kurulum: Node servisinde ASSISTANT_CHAT_ENDPOINT = Python servisinizin
#   https://<python-service>.onrender.com/api/chat adresi olmalı.
# Vercel / statik site API tabanı: Node servisin https://<node-service>.onrender.com/api
# (Python URL’si değil.)
#
services:
  - type: web
    name: viona-assistant
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn assistant.main:app --app-dir src --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"

  - type: web
    name: viona-node-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: ASSISTANT_CHAT_ENDPOINT
        value: https://viona-kaila.onrender.com/api/chat
      # Aşağısı olmadan Node process env yüklerken çöker → Render "no-server" / tarayıcıda Failed to fetch
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
