# Render Blueprint — bu repodan SADECE Node (Express) API.
# Python asistan ayrı repoda / ayrı servis (örn. https://viona-kaila.onrender.com) ise
# burada ikinci bir web servisi tanımlamayın; çift deploy olmasın.
#
# Panel: New → Blueprint → bu repo. Oluşan URL, servis adıyla biter:
#   name: viona-node-api  →  https://viona-node-api.onrender.com
# Frontend (viona-backend-url.js + vercel.json) bu host ile uyumludur.
# Operasyon özeti (PDF indirilebilir): server/docs/deploy-and-operations-report.md
#
# Supabase DNS: Render/OS bazen getaddrinfo EAI_AGAIN verir; Node için genel çözümleyiciler önerilir.
# Blueprint’te DNS_SERVERS sabitlenir; Dashboard’dan override edilebilir.
#
# Zorunlu env (Render Dashboard → Environment):
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, ADMIN_API_TOKEN
#   ASSISTANT_CHAT_ENDPOINT = Python asistanın tam chat URL’si (aşağıdaki varsayılan)
# Operasyon WhatsApp (Cloud API, bireysel numaralar; grup botu / whatsapp-web.js yok):
#   WHATSAPP_ACCESS_TOKEN, WHATSAPP_PHONE_NUMBER_ID
#   WHATSAPP_TECH_RECIPIENTS, WHATSAPP_HK_RECIPIENTS, WHATSAPP_FRONT_RECIPIENTS (virgülle)
#   İsteğe bağlı şablon «Panelde Aç» URL butonu (Meta şablonu uyumlu olmalı, ayrıntı server/.env.example):
#   WHATSAPP_HK_PANEL_URL_BUTTON, WHATSAPP_TECH_PANEL_URL_BUTTON, WHATSAPP_FRONT_PANEL_URL_BUTTON
# Eski grup oturumu env anahtarlarını Dashboard’dan silin (kafa karıştırır).
# Opsiyonel (misafir istek/arıza Telegram):
#   TELEGRAM_TEKNIK_BOT_TOKEN, TELEGRAM_TEKNIK_CHAT_ID, TELEGRAM_HK_BOT_TOKEN, TELEGRAM_HK_CHAT_ID
# Sesli Viona (TTS/STT, Azure — Dashboard’dan ekleyin; aşağıdaki sync: false satırları hatırlatıcı):
#   AZURE_SPEECH_KEY, AZURE_SPEECH_REGION, AZURE_SPEECH_FETCH_TIMEOUT_MS (isteğe bağlı)
# PDF raporu (admin): GEMINI_API_KEY önerilir. Chromium proje içi önbellek + build’de kurulum (aşağıda).
#   PUPPETEER_CACHE_DIR=.cache/puppeteer, buildCommand içinde browsers install chrome zorunlu.
#   İsteğe bağlı: PUPPETEER_EXECUTABLE_PATH, PDF_GEMINI_TIMEOUT_MS, PDF_SET_CONTENT_TIMEOUT_MS
#
services:
  - type: web
    name: viona-node-api
    runtime: node
    plan: free
    rootDir: server
    # Chromium ~/.cache’e inerse deploy slug’ına girmez; build sırasında da proje .cache’e yazılmalı.
    buildCommand: npm install && PUPPETEER_CACHE_DIR=.cache/puppeteer npx puppeteer browsers install chrome && node scripts/verify-puppeteer-chrome.mjs
    startCommand: node src/index.js
    envVars:
      - key: DNS_SERVERS
        value: "8.8.8.8,1.1.1.1"
      - key: NODE_VERSION
        value: "20.18.0"
      - key: PUPPETEER_CACHE_DIR
        value: .cache/puppeteer
      - key: ASSISTANT_CHAT_ENDPOINT
        value: https://viona-kaila.onrender.com/api/chat
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_TECH_RECIPIENTS
        sync: false
      - key: WHATSAPP_HK_RECIPIENTS
        sync: false
      - key: WHATSAPP_FRONT_RECIPIENTS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_VECTOR_STORE_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_TEKNIK_BOT_TOKEN
        sync: false
      - key: TELEGRAM_TEKNIK_CHAT_ID
        sync: false
      - key: TELEGRAM_HK_BOT_TOKEN
        sync: false
      - key: TELEGRAM_HK_CHAT_ID
        sync: false
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        sync: false
      # Günlük operasyon PDF → WhatsApp; İstanbul 20:30 ( yerel .env repoda yok — canlı için burada sabitlenir )
      - key: DAILY_OPERATION_REPORT_ENABLED
        value: "1"
      - key: DAILY_OPERATION_REPORT_TZ
        value: Europe/Istanbul
      - key: DAILY_OPERATION_REPORT_HOUR
        value: "20"
      - key: DAILY_OPERATION_REPORT_MINUTE
        value: "30"
      - key: DAILY_OPERATION_REPORT_CRON
        value: "30 20 * * *"
